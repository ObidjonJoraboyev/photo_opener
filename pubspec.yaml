name: photo_opener
description: >
  Telegram-style full-screen image viewer for Flutter. Pinch to zoom, swipe between
  images, thumbnails, swipe-down to dismiss. Supports network, assets, and local files.
version: 0.2.9
homepage: https://github.com/ObidjonJoraboyev/photo_opener
repository: https://github.com/ObidjonJoraboyev/photo_opener
issue_tracker: https://github.com/ObidjonJoraboyev/photo_opener/issues
documentation: https://github.com/ObidjonJoraboyev/photo_opener#readme
topics:
  - image
  - gallery
  - viewer
  - zoom
  - photos
  - fullscreen
  - media-viewer

environment:
  sdk: ^3.5.4
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
